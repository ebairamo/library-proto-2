name: Generate gRPC and Push

on:
  push:
    branches:
      - master # Запуск при каждом пуше в ветку master
  workflow_dispatch: # Оставляем кнопку для ручного запуска

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout library-proto
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Clone Main App Repo
        run: |
          git clone https://x-access-token:${{ secrets.PROTO_ACTION_TOKEN }}@github.com/ebairamo/ebairamo.git ebairamo-app

      - name: Clean Old Code
        run: rm -rf ebairamo-app/gen/go/*

      - name: Generate gRPC code
        run: |
          mkdir -p ebairamo-app/gen/go
          protoc \
            --proto_path=api/proto \
            --go_out=ebairamo-app \
            --go_opt=module=github.com/ebairamo/ebairamo \
            --go-grpc_out=ebairamo-app \
            --go-grpc_opt=module=github.com/ebairamo/ebairamo \
            api/proto/library/v1/*.proto

      - name: Commit & Push to ebairamo Repo
        run: |
          cd ebairamo-app
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add gen/go/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generated gRPC code from library-proto"
            git push origin master
          fi